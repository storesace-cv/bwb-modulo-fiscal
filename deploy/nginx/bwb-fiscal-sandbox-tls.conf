# TLS site for sandbox.fiscalmod.bwb.pt — DO NOT enable until certificates exist (D2).
# Bootstrap without certs: use bwb-fiscal-sandbox-http.conf only.
#
# After certbot succeeds, point ssl_certificate paths to real files on the host.
# Run: nginx -t && systemctl reload nginx
# Failed reload must leave the previous configuration active.
#
# HSTS: enable only after TLS + renewal dry-run succeed; no includeSubDomains initially.
# /v1/documents remains deny-all here; IP allowlist overlay is non-versioned (D2).

upstream bwb_fiscal_api_tls {
    server 127.0.0.1:8080;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name sandbox.fiscalmod.bwb.pt;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    # Enable only after certificate issuance:
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sandbox.fiscalmod.bwb.pt;

    # Replace with real paths after ACME (D2). Paths below are illustrative only.
    ssl_certificate     /etc/letsencrypt/live/sandbox.fiscalmod.bwb.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sandbox.fiscalmod.bwb.pt/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Uncomment only after renewal proven (no includeSubDomains initially):
    # add_header Strict-Transport-Security "max-age=31536000" always;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    client_max_body_size 1m;
    proxy_connect_timeout 5s;
    proxy_send_timeout 15s;
    proxy_read_timeout 15s;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
    proxy_set_header X-Request-Id "";

    location = /v1/health {
        proxy_pass http://bwb_fiscal_api_tls;
    }

    location /v1/documents {
        deny all;
        return 403;
    }

    location / {
        return 404;
    }
}

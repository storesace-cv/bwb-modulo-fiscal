# Loopback-only rate-limit measurement listener (S3B).
# MUST listen on 127.0.0.1 only. MUST NOT be exposed by UFW.
# Applies the same provisional limit_req as the HTTPS open candidate.
# Requires http.d/bwb-limit-req-documents-provisional.conf loaded in http {}.
#
# S3A updater MUST NOT activate the public open candidate.
# After S3C public open: disable/remove this file and verify :18080 is gone.

upstream bwb_fiscal_api_measure {
    server 127.0.0.1:8080;
    keepalive 4;
}

server {
    listen 127.0.0.1:18080;
    server_name _;

    client_max_body_size 1m;
    proxy_connect_timeout 5s;
    proxy_send_timeout 15s;
    proxy_read_timeout 15s;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_set_header X-Request-Id "";

    location = /v1/health {
        proxy_pass http://bwb_fiscal_api_measure;
    }

    location /v1/documents {
        limit_req zone=bwb_documents burst=20 nodelay;
        proxy_pass http://bwb_fiscal_api_measure;
    }

    location / {
        return 404;
    }
}

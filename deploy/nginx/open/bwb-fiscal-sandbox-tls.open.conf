# S3C2 canonical OPEN TLS site for sandbox.fiscalmod.bwb.pt.
# rate=10r/s burst=20 from approved S3C1 evidence (983a8013…).
# Installed ONLY via closed helper op nginx-open-arm (never by updater).
# Rollback artefact: deploy/nginx/bwb-fiscal-sandbox-tls.conf (deny-all).

upstream bwb_fiscal_api_tls {
    server 127.0.0.1:8080;
    keepalive 8;
}

server {
    listen 80;
    server_name sandbox.fiscalmod.bwb.pt;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sandbox.fiscalmod.bwb.pt;

    ssl_certificate     /etc/letsencrypt/live/sandbox.fiscalmod.bwb.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sandbox.fiscalmod.bwb.pt/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    client_max_body_size 1m;
    proxy_connect_timeout 5s;
    proxy_send_timeout 15s;
    proxy_read_timeout 15s;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
    proxy_set_header X-Request-Id "";

    location = /v1/health {
        proxy_pass http://bwb_fiscal_api_tls;
    }

    location /v1/documents {
        limit_req zone=bwb_documents burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://bwb_fiscal_api_tls;
    }

    location / {
        return 404;
    }
}

# Bootstrap HTTP only — do not add TLS certificate file directives here.
# Install for ACME HTTP-01 and initial proxy before certificates exist.
# TLS site: see bwb-fiscal-sandbox-tls.conf (enable only after cert issuance in D2).
#
# /v1/documents is deny-all in the versioned tree. Real IP allowlists belong in a
# non-versioned overlay on the server (D2), never as open placeholders here.

upstream bwb_fiscal_api {
    server 127.0.0.1:8080;
    keepalive 8;
}

server {
    # IPv6 listen deferred to D2 (confirm address, firewall, AAAA decision).
    listen 80;
    server_name sandbox.fiscalmod.bwb.pt;

    # ACME HTTP-01 (certbot webroot). Adjust root in D2.
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    # Do NOT enable permanent HTTPS redirect until certificates are issued (D2).

    client_max_body_size 1m;
    proxy_connect_timeout 5s;
    proxy_send_timeout 15s;
    proxy_read_timeout 15s;

    # Application generates X-Request-Id. Do not trust or forward client value.
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    # Explicitly drop inbound request-id from clients:
    proxy_set_header X-Request-Id "";

    location = /v1/health {
        proxy_pass http://bwb_fiscal_api;
    }

    location /v1/documents {
        deny all;
        return 403;
    }

    location / {
        return 404;
    }
}

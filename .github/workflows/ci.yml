name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: go-checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fiscal
          POSTGRES_PASSWORD: fiscal
          POSTGRES_DB: fiscal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fiscal -d fiscal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      FISCAL_TEST_DATABASE_URL: postgres://fiscal:fiscal@localhost:5432/fiscal?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:"
            echo "$unformatted"
            exit 1
          fi

      - name: Shellcheck deploy scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck -x -P SCRIPTDIR -e SC1091 \
            scripts/deploy/lib/allowlist.sh \
            scripts/deploy/*.sh \
            tests/deploy/run-tests.sh

      - name: Deploy D1 script tests
        run: |
          bash -n scripts/deploy/*.sh scripts/deploy/lib/*.sh tests/deploy/run-tests.sh tests/deploy/mocks/bin/*
          bash scripts/deploy/check-antipatterns.sh
          bash tests/deploy/run-tests.sh
          git diff --check

      - name: OpenAPI lint
        run: |
          npx --yes @redocly/cli@1.34.3 lint specs/openapi/openapi.yaml

      - name: Migration parity and immutability
        if: github.event_name == 'pull_request'
        env:
          MIGRATION_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash scripts/check-migrations.sh

      - name: Migration parity (push to main)
        if: github.event_name == 'push'
        run: bash scripts/check-migrations.sh

      - name: Vet
        run: go vet ./...

      - name: Test race
        run: go test -race ./...

      - name: Install tools
        working-directory: tools
        run: |
          go mod download
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          go install github.com/google/go-licenses@v1.6.0

      - name: govulncheck
        run: govulncheck ./...

      - name: License check
        run: |
          ALLOWED="$(tr '\n' ',' < licenses/allowlist.txt | sed 's/,$//')"
          go-licenses check ./cmd/fiscal-api ./cmd/fiscal-migrate \
            --ignore github.com/storesace-cv/bwb-modulo-fiscal \
            --ignore modernc.org/mathutil \
            --allowed_licenses="$ALLOWED"

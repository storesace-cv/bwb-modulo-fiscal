openapi: 3.1.0
info:
  title: BWB Fiscal API
  version: 0.1.2-draft
  description: >
    Contrato público draft para POS/software houses. createDocument cria e sela
    localmente de forma atómica (201). Não pronto para produção. Autenticação
    bearerAuth é do POS/módulo — não são credenciais AGT.
servers:
  - url: https://sandbox.api.example.ao/v1
    description: Sandbox
  - url: http://127.0.0.1:8080/v1
    description: Fiscal Edge local
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check do serviço
      security: []
      responses:
        "200":
          description: Serviço disponível
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /documents:
    post:
      operationId: createDocument
      summary: Cria e sela localmente um documento fiscal (operação atómica)
      description: >
        Submete uma intenção de documento. O módulo valida, resolve a série
        efetiva (o POS não escolhe a SeriesCode autorizada), numera e sela
        localmente na mesma operação. Sucesso devolve 201 com status
        sealed_locally. Relacionado com AO-IDEM-001 (idempotência) e AO-SEQ-002
        (POS não atribui número fiscal); a conformidade certificável ainda não
        está validada neste draft.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentIntent"
            examples:
              minimalInvoice:
                summary: Intenção mínima (dados fictícios)
                value:
                  external_id: "pos-demo-0001"
                  document_type: invoice
                  currency: AOA
                  issued_at: "2026-07-21T10:00:00Z"
                  requested_series: "REF-A"
                  seller:
                    tax_id: "0000000000"
                    name: "Comerciante Exemplo Lda"
                  lines:
                    - line_id: "L1"
                      description: "Artigo demonstração"
                      quantity: "1"
                      unit_price: "10.50"
                      tax_code: "NOR"
      responses:
        "201":
          description: >
            Documento criado e selado localmente. status é sealed_locally.
            Neste incremento fiscal_number e authority_request_id estão ausentes
            (formato oficial de numeração e ID da autoridade ainda não confirmados).
            submission_id, se presente, é correlação interna do módulo — não é ID AGT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FiscalDocumentResponse"
              examples:
                sealedLocally:
                  summary: Sucesso (campos deste incremento)
                  value:
                    id: "doc_01EXAMPLE000000000000000"
                    external_id: "pos-demo-0001"
                    status: sealed_locally
                    submission_id: "sub_01EXAMPLE000000000000000"
                    created_at: "2026-07-21T10:00:01.000000000Z"
        "401":
          description: Autenticação ausente ou inválida
          headers:
            WWW-Authenticate:
              description: Desafio Bearer para a API do módulo (não AGT)
              schema: { type: string }
              example: Bearer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: "https://docs.example/errors/unauthorized"
                    title: Não autenticado
                    status: 401
                    code: FISCAL_UNAUTHORIZED
                    request_id: "req_01EXAMPLE000000000000000"
        "403":
          description: Identidade autenticada sem autorização para o recurso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: "https://docs.example/errors/forbidden"
                    title: Não autorizado
                    status: 403
                    code: FISCAL_FORBIDDEN
                    request_id: "req_01EXAMPLE000000000000000"
        "409":
          description: >
            Conflito de idempotência (mesma Idempotency-Key, pedido semanticamente
            diferente) ou conflito de external_id. Códigos estáveis distintos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                idempotencyConflict:
                  summary: Conflito de idempotência (AO-IDEM-001)
                  value:
                    type: "https://docs.example/errors/idempotency-conflict"
                    title: Conflito de idempotência
                    status: 409
                    code: FISCAL_IDEMPOTENCY_CONFLICT
                    request_id: "req_01EXAMPLE000000000000000"
                externalIdConflict:
                  summary: Conflito de external_id
                  value:
                    type: "https://docs.example/errors/external-id-conflict"
                    title: Conflito de identificador externo
                    status: 409
                    code: FISCAL_EXTERNAL_ID_CONFLICT
                    request_id: "req_01EXAMPLE000000000000000"
        "413":
          description: Corpo do pedido excede o limite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                payloadTooLarge:
                  value:
                    type: "https://docs.example/errors/payload-too-large"
                    title: Corpo demasiado grande
                    status: 413
                    code: FISCAL_PAYLOAD_TOO_LARGE
                    request_id: "req_01EXAMPLE000000000000000"
        "415":
          description: Content-Type não é application/json (charset válido permitido)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unsupportedMediaType:
                  value:
                    type: "https://docs.example/errors/unsupported-media-type"
                    title: Tipo de média não suportado
                    status: 415
                    code: FISCAL_UNSUPPORTED_MEDIA_TYPE
                    request_id: "req_01EXAMPLE000000000000000"
        "422":
          description: Falha de validação do pedido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                validationFailed:
                  value:
                    type: "https://docs.example/errors/validation"
                    title: Documento inválido
                    status: 422
                    code: FISCAL_VALIDATION_FAILED
                    request_id: "req_01EXAMPLE000000000000000"
                    errors:
                      - field: "currency"
                        code: "INVALID_ENUM"
                        message: "Valor não permitido"
        "500":
          description: Erro interno; sem exposição de dados fiscais
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                internal:
                  value:
                    type: "https://docs.example/errors/internal"
                    title: Erro interno
                    status: 500
                    code: FISCAL_INTERNAL_ERROR
                    request_id: "req_01EXAMPLE000000000000000"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        Autenticação da máquina POS / software house perante o módulo fiscal.
        Não são credenciais AGT nem tokens da autoridade tributária. O modo de
        validação concreto é configurado no serviço (produção fail-closed sem
        validador real).
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >
        UUID persistido pelo integrador antes da primeira tentativa (AO-IDEM-001).
        Replay com a mesma chave e o mesmo pedido devolve a resposta original;
        pedido semanticamente diferente com a mesma chave resulta em 409.
      schema: { type: string, format: uuid }
  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status, version]
      properties:
        status: { type: string, enum: [ok, degraded] }
        version: { type: string }
        fiscalPackage: { type: string }
    Money:
      type: string
      description: >
        Valor monetário canónico em string (DEC-API-001). Uso atual unit_price.
        Escala fixa 2 casas (MVP AOA). Sem sinal; notas de crédito via document_type.
        Limite de 16 dígitos inteiros é técnico de segurança, não regra fiscal AGT.
      pattern: "^(0|[1-9][0-9]{0,15})\\.[0-9]{2}$"
      examples: ["1250.00", "0.00", "10.50"]
    DecimalQuantity:
      type: string
      description: >
        Quantidade de linha estritamente positiva e canónica (DEC-API-003).
        Sem zeros à esquerda nem zeros fracionários finais desnecessários.
        Limites 12 dígitos inteiros / 4 fracionários são técnicos, não fiscais.
      pattern: "^(?:0\\.[0-9]{0,3}[1-9]|[1-9][0-9]{0,11}(?:\\.[0-9]{0,3}[1-9])?)$"
      examples: ["1", "1.5", "0.0001", "12.3456", "1.01"]
    DocumentIntent:
      type: object
      additionalProperties: false
      required: [external_id, document_type, currency, issued_at, seller, lines]
      properties:
        external_id: { type: string, maxLength: 100 }
        document_type: { type: string, enum: [invoice, credit_note] }
        currency: { type: string, enum: [AOA] }
        issued_at: { type: string, format: date-time }
        requested_series:
          type: string
          description: >
            Referência de série pedida pelo POS. A SeriesCode efetiva e autorizada
            é resolvida apenas pelo módulo (AO-SEQ-002). O POS não atribui o número
            fiscal nem escolhe a série efetiva.
        seller: { $ref: "#/components/schemas/Party" }
        customer: { $ref: "#/components/schemas/Party" }
        lines:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/DocumentLine" }
    Party:
      type: object
      additionalProperties: false
      properties:
        tax_id: { type: string }
        name: { type: string }
    DocumentLine:
      type: object
      additionalProperties: false
      required: [line_id, description, quantity, unit_price, tax_code]
      properties:
        line_id: { type: string }
        description: { type: string }
        quantity: { $ref: "#/components/schemas/DecimalQuantity" }
        unit_price: { $ref: "#/components/schemas/Money" }
        tax_code: { type: string }
    FiscalDocumentResponse:
      type: object
      additionalProperties: false
      required: [id, external_id, status]
      properties:
        id: { type: string }
        external_id: { type: string }
        status:
          type: string
          description: >
            Estados técnicos do documento. createDocument neste incremento devolve
            apenas sealed_locally (derivado do ledger). Outbox pending não implica
            queued_for_authority sem transição de ledger. sealed_locally não afirma
            emissão jurídica (DEC-API-004 aberta). contingency_pending está reservado.
          enum:
            - received
            - validated
            - sealed_locally
            - contingency_pending
            - queued_for_authority
            - authority_processing
            - authority_accepted
            - authority_rejected
            - authority_outcome_unknown
            - rejected
        submission_id:
          type: string
          description: >
            Identificador interno de correlação do módulo (ex. outbox/submission).
            Não é um identificador atribuído pela AGT nem authority_request_id.
        fiscal_number:
          type: string
          description: >
            Número fiscal oficial, quando o formato estiver confirmado. Opcional;
            ausente neste incremento — não compor a partir de sequência técnica interna.
        authority_request_id:
          type: string
          description: >
            Identificador atribuído pela autoridade ou simulador. Opcional; ausente
            até ser recebido da autoridade. Não usar submission_id interno neste campo.
        created_at: { type: string, format: date-time }
    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status, code, request_id]
      properties:
        type:
          type: string
          format: uri
        title: { type: string }
        status:
          type: integer
          minimum: 100
          maximum: 599
        code:
          type: string
          description: Código estável acionável pelo integrador
        request_id:
          type: string
          description: Identificador gerado pelo servidor para correlação
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ProblemError"
    ProblemError:
      type: object
      additionalProperties: false
      required: [field, code, message]
      properties:
        field: { type: string }
        code: { type: string }
        message: { type: string }
